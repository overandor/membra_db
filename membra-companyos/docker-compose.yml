version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: membra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-membra}
      POSTGRES_DB: membra_companyos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U membra -d membra_companyos"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://membra:${POSTGRES_PASSWORD:-membra}@db:5432/membra_companyos
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY (min 32 chars) in your environment}
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      DEBUG: "false"
      CORS_ORIGINS: http://localhost:8080,http://localhost:3000
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
