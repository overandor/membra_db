services:
  - type: web
    name: membra-companyos-api
    runtime: python
    plan: standard
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /v1/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: membra-companyos-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: membra-companyos-db
    plan: standard
    databaseName: membra_companyos
    user: membra
