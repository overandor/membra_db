name: CI

on:
  push:
    paths:
      - "membra-companyos/**"
  pull_request:
    paths:
      - "membra-companyos/**"

defaults:
  run:
    working-directory: membra-companyos/backend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: membra
          POSTGRES_PASSWORD: membra
          POSTGRES_DB: membra_companyos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U membra -d membra_companyos_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: membra-companyos/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          SECRET_KEY: ci-secret-key-must-be-at-least-32-characters-long
          DATABASE_URL: postgresql://membra:membra@localhost:5432/membra_companyos_test
        run: alembic upgrade head

      - name: Pytest
        env:
          SECRET_KEY: ci-secret-key-must-be-at-least-32-characters-long
          DATABASE_URL: postgresql://membra:membra@localhost:5432/membra_companyos_test
          ENVIRONMENT: test
        run: pytest -q
