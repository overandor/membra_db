version: '3.8'

services:
  overmanifold-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: overmanifold-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=overmanifold
      - DB_USER=overmanifold
      - DB_PASSWORD=overmanifold_dev_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=dev_secret_key_change_in_production_32_chars
      - LOG_LEVEL=DEBUG
    volumes:
      - ./logs:/var/log/overmanifold
      - ./overmanifold:/app/overmanifold
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - overmanifold-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: overmanifold-postgres
    environment:
      - POSTGRES_DB=overmanifold
      - POSTGRES_USER=overmanifold
      - POSTGRES_PASSWORD=overmanifold_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - overmanifold-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overmanifold"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: overmanifold-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - overmanifold-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: overmanifold-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - overmanifold-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: overmanifold-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - overmanifold-network
    depends_on:
      - prometheus
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: overmanifold-redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - overmanifold-network
    depends_on:
      - redis
    restart: unless-stopped

networks:
  overmanifold-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data: